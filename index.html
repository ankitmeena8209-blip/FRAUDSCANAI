<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="FraudScanAI is a premium cybersecurity SaaS for detecting fake news, scams, phishing, fraud emails, and suspicious screenshots." />
    <title>FraudScanAI</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body,
      #root {
        margin: 0;
        min-height: 100%;
        background: #060816;
      }

      body {
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #f8fafc;
      }

      #root {
        min-height: 100vh;
      }

      .app-shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, rgba(34, 211, 238, 0.2), transparent 42%), #060816;
      }

      .app-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.85rem;
        padding: 1.5rem 2rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 999px;
        background: rgba(2, 6, 23, 0.8);
        box-shadow: 0 20px 45px rgba(2, 6, 23, 0.35);
      }

      .loader-ring {
        width: 52px;
        height: 52px;
        border-radius: 999px;
        border: 3px solid rgba(34, 211, 238, 0.18);
        border-top-color: #22d3ee;
        animation: spin 1s linear infinite;
      }

      .app-loader p {
        margin: 0;
        font-size: 0.95rem;
        color: #cbd5e1;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-shell">
        <div class="app-loader">
          <div class="loader-ring"></div>
          <p>Initializing FraudScanAI…</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
